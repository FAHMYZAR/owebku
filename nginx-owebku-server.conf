server {
    listen 80;
    server_name owebku.site www.owebku.site;

    root /var/www/html/owebku;
    index index.php index.html;
    charset utf-8;
    client_max_body_size 50M;

    server_tokens off;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Public user sites are static only. Never execute server-side files.
    location /sites/ {
        root /var/www/html/owebku;
        index index.html index.htm;
        try_files $uri $uri/ =404;
        location ~* \.(?:php[0-9]?|phtml|phar|cgi|pl|py|rb|sh|so)$ {
            return 404;
        }
    }

    # This application does not require direct web access to temporary uploads.
    location ^~ /public/uploads/ {
        return 404;
    }

    # Private and operational files must never be exposed.
    location ^~ /src/ { return 404; }
    location ^~ /storage/ { return 404; }
    location ^~ /.git/ { return 404; }
    location ~* ^/(?:migrate\.php|deploy-vps\.sh|README\.md|AGENTS\.md|\.env)$ { return 404; }
    location ~ /\. { return 404; }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Only the front controller may execute through PHP-FPM.
    location = /index.php {
        include fastcgi_params;
        fastcgi_pass php:9000;
        fastcgi_param SCRIPT_FILENAME /var/www/html/owebku/index.php;
        fastcgi_param SCRIPT_NAME /index.php;
        fastcgi_param HTTP_X_FORWARDED_PROTO $http_x_forwarded_proto;
        fastcgi_param HTTP_X_FORWARDED_HOST $http_x_forwarded_host;
        fastcgi_param HTTP_CF_VISITOR $http_cf_visitor;
        fastcgi_param HTTPS $https if_not_empty;
    }

    # Block execution of every other PHP file, including uploaded/published files.
    location ~* \.php(?:/|$) {
        return 404;
    }
}
